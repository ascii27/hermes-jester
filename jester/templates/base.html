<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}hermes-jester{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  {% if user %}
  <header class="topbar">
    <a class="brand" href="/">hermes-jester</a>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/ui/items">Items</a>
      <a href="/ui/types">Types</a>
      <a href="/ui/keys">Keys</a>
    </nav>
    <span class="spacer"></span>
    <span class="who">{{ user.email }}</span>
    <a class="logout" href="/auth/logout">Sign out</a>
  </header>
  {% endif %}
  <main>
    {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
